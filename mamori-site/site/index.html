<body>

    <main class="hero-section">
        <div class="main-visual">
            <div class="douga-text">
                <p>操作画面(PC用)のプレビューです</p>

            <img src="img/mamori-preview-pc.gif" alt="PC操作動画">
               
                   <section class="text-section">
                     <div class="text-container">
                      <div class="text-card">
                          <p>・マウスを置いたときにボタンの色が変わるなど、『押せること』が直感的に伝わるデザインのバリエーションを作成しました。</p>
                      </div>
                    
                      <div class="text-card">
                          <p>・ボタンをクリックすると、ページ内の特定の場所や上部へ瞬時に移動する動作（シミュレーション）を設定しました。</p>
                      </div>

                      </div>
                   </section>

      <!-- サイトに移動するボタン -->
<div class="view-site-container">

" target="_blank" class="btn-view-site">
    View Figma →</span>
  </a>
</div>

                  
        <div class="second-visual">
            <div class="douga-text">
                <p>操作画面(携帯用)のプレビューです</p>

            <img src="img/mamori-preview-phone.gif" alt="PC操作動画">
               
                   <section class="text-section">
                     <div class="text-container">
                      <div class="text-card">
                          <p>・スマホ使用時に操作のしやすいボタンの高さや、文字サイズを意識し作成しました。</p>
                      </div>
                    
                      <div class="text-card">
                          <p>・画面をすっきり見せるため、クリックするとメニューが飛び出す折りたたみ式のナビゲーション（三本線のアイコン）を導入しました。</p>

                      </div>
