<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>mamori動画表示ページ</title>
</head>
<body>

    <main class="hero-section">
        <div class="main-visual">
            <div class="douga-text">
                <p>操作画面(PC用)のプレビューです</p>

            <img src="img/mamori-preview-pc.gif" alt="PC操作動画">
               
                   <section class="text-section">
                     <div class="text-container">
                      <div class="text-card">
                          <p>・バリアント機能を使用しホバー時に色が変わる仕様の購入ボタン等、動きのあるボタンの作成を行いました</p>
                      </div>
                    
                      <div class="text-card">
                          <p>・プロトタイプ機能を使用しページ上部に戻るボタン等、ページ内リンクの設定を行いました</p>
                      </div>

                      </div>
                   </section>


        <div class="second-visual">
            <div class="douga-text">
                <p>操作画面(携帯用)のプレビューです</p>

            <img src="img/mamori-preview-phone.gif" alt="PC操作動画">
               
                   <section class="text-section">
                     <div class="text-container">
                      <div class="text-card">
                          <p>・スマホ使用時に操作のしやすいボタンの高さや、文字サイズを意識し作成しました</p>
                      </div>
                    
                      <div class="text-card">
                          <p>・ナビゲーションをハンバーガーメニューで表示される仕様に設定しました</p>
                      </div>
                      </div>
                    </section>

            </div>
        </div>
    </main>

</body>
</html>
